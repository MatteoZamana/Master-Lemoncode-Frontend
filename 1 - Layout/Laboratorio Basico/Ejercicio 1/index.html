<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Esercizio 1 - Tavolozze di colori</title>
    <link rel="stylesheet" href="/mystyle.scss" />
  </head>
  <body>
    <h2>Palette Blu</h2>
    <div class="container container-blue">
      <div class="box darken-4">D4</div>
      <div class="box darken-3">D3</div>
      <div class="box darken-2">D2</div>
      <div class="box darken-1">D1</div>
      <div class="box base-color">Base</div>
      <div class="box lighten-1">L1</div>
      <div class="box lighten-2">L2</div>
      <div class="box lighten-3">L3</div>
      <div class="box lighten-4">L4</div>
    </div>

    <h2>Palette Rossa</h2>
    <div class="container container-red">
      <div class="box darken-4">D4</div>
      <div class="box darken-3">D3</div>
      <div class="box darken-2">D2</div>
      <div class="box darken-1">D1</div>
      <div class="box base-color">Base</div>
      <div class="box lighten-1">L1</div>
      <div class="box lighten-2">L2</div>
      <div class="box lighten-3">L3</div>
      <div class="box lighten-4">L4</div>
    </div>

    <h2>Palette Verde</h2>
    <div class="container container-green">
      <div class="box darken-4">D4</div>
      <div class="box darken-3">D3</div>
      <div class="box darken-2">D2</div>
      <div class="box darken-1">D1</div>
      <div class="box base-color">Base</div>
      <div class="box lighten-1">L1</div>
      <div class="box lighten-2">L2</div>
      <div class="box lighten-3">L3</div>
      <div class="box lighten-4">L4</div>
    </div>
  </body>
</html>
